name: Update council data

on:
  schedule:
    # 毎月1日 00:30 UTC = 09:30 JST
    - cron: '30 0 1 * *'
  workflow_dispatch: {}

permissions:
  contents: write   # コミット & プッシュ
  issues: write     # 失敗時の Issue 作成

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep poppler-utils

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate members data
        run: |
          python scripts/councils/tottori_pref.py
          python scripts/councils/tottori_city.py
          python scripts/councils/yonago.py
          python scripts/councils/kurayoshi.py
          # 境港市公式サイトにはアクセスせず、手動入力JSONから生成する。
          python scripts/councils/sakaiminato.py

      - name: Generate speeches data
        run: |
          python scripts/adapters/minutes_kensakusystem_legacy.py yonago-city
          python scripts/adapters/minutes_kensakusystem_legacy.py kurayoshi-city
          python scripts/adapters/minutes_kensakusystem_legacy.py sakaiminato-city

      - name: Generate votes data
        run: |
          python scripts/adapters/votes_pdf_yonago_result_only.py
          python scripts/adapters/votes_pdf_kurayoshi.py
          python scripts/adapters/votes_pdf_tottori_pref.py
          # 境港市公式サイトにはアクセスせず、手動ダウンロード済みPDFから再生成する。
          python scripts/adapters/votes_pdf_sakaiminato.py

      - name: Generate profile data
        run: python scripts/profile_builder.py

      - name: Generate timeseries data
        env:
          ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}
        run: |
          if [ -z "$ESTAT_APP_ID" ]; then
            echo "::error::ESTAT_APP_ID secret is not set."
            exit 1
          fi
          python scripts/timeseries_builder.py

      - name: Validate data
        run: python scripts/validate.py

      - name: Check official links
        id: link-check
        run: |
          set +e
          python scripts/check_links.py > /tmp/link-check.log 2>&1
          status=$?
          cat /tmp/link-check.log
          if [ "$status" -ne 0 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
            {
              echo 'log<<EOF'
              cat /tmp/link-check.log
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check excluded personal/contact info
        run: python scripts/check_personal_info.py docs/data

      - name: Create issue on official link check failure
        if: steps.link-check.outputs.failed == 'true'
        uses: actions/github-script@v7
        env:
          LINK_CHECK_LOG: ${{ steps.link-check.outputs.log }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            const log = (process.env.LINK_CHECK_LOG || '').slice(0, 6000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[auto] 公式リンク生存チェックで要確認 (${today})`,
              body: [
                '公式リンク生存チェックで 4xx/5xx または接続失敗がありました。',
                'データ更新ジョブは継続しています。自動修正は行いません。',
                '',
                `- 実行URL: ${runUrl}`,
                `- 日付(UTC): ${today}`,
                '',
                '検出内容:',
                '```',
                log,
                '```',
                '',
                '_このIssueはGitHub Actionsにより自動作成されました。_',
              ].join('\n'),
            });

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No data changes; skipping commit."
          else
            git commit -m "chore(data): update council data ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[auto] 議員データ自動更新が失敗 (${today})`,
              body: [
                '5議会データの自動更新ワークフローが失敗しました。',
                '',
                `- 実行URL: ${runUrl}`,
                `- 日付(UTC): ${today}`,
                '',
                '考えられる原因:',
                '- 議員名簿ページの構造変更',
                '- kensakusystem legacy 会議録検索の構造変更',
                '- 手動入力JSONの検証エラー',
                '- 個人情報除外grepの検出',
                '- ネットワーク障害',
                '- パース結果の異常(議員数が想定範囲外)',
                '',
                'ログを確認のうえ、該当する scraper / adapter / source JSON を修正してください。',
                '',
                '_このIssueはGitHub Actionsにより自動作成されました。_',
              ].join('\n'),
            });
