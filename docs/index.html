<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>議会見える化</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="home-link" href="#/">議会見える化</a>
      <h1 id="page-title">議会見える化</h1>
      <p class="lead" id="page-lead">対応地域の公開データを同じ形で見られるようにする非公式サイトです。</p>
      <p class="meta" id="meta">読み込み中...</p>
      <section class="profile-strip" id="profile" hidden></section>
    </div>
  </header>

  <nav class="view-nav" id="view-nav" hidden>
    <div class="container">
      <button class="view-tab is-active" data-view="kaiha">会派</button>
      <button class="view-tab" data-view="committee">委員会</button>
      <button class="view-tab" data-view="role">役職</button>
      <button class="view-tab" data-view="term">当選回数</button>
      <button class="view-tab" data-view="votes">議決一覧</button>
      <div class="search-row">
        <input
          type="search"
          id="search"
          class="search-input"
          placeholder="氏名 / ふりがな / 会派 / 委員会 で検索"
          autocomplete="off"
        />
        <button type="button" id="search-clear" class="search-clear" hidden
          aria-label="検索をクリア">×</button>
        <span id="match-count" class="match-count"></span>
      </div>
    </div>
  </nav>

  <main class="container" id="main">
    <p id="status">データを読み込み中...</p>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>このサイトは非公式・個人運営です。正確な情報は公式発表を優先してください。 | <a href="#/about">このサイトについて</a></p>
    </div>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
